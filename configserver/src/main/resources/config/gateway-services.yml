spring:
  cloud:
    gateway:
      routes:
        - id: user-services
          uri: lb://USER-SERVICES
          predicates:
            - Path=/api/users/**

        - id: activity-service
          uri: lb://ACTIVITY-SERVICE
          predicates:
            - Path=/api/activities/**


        - id: ai-services
          uri: lb://AI-SERVICES
          predicates:
            - Path=/api/recommendations/**

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/


logging:
  level:
    org.springframework.cloud.gateway: TRACE
    reactor.netty.http.client: DEBUG